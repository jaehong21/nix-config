[tools]
# Languages and Runtimes
node = "24.11.1"
bun = "1.3"
go = "1.24"
python = "3.14"
rust = { version = "1.94.1", components = "rust-analyzer", targets = "wasm32-wasip1" }

# Package managers
pipx = "latest"
uv = "latest"

# Coding Assistants
codex = "latest"
# claude = "latest" # use native installer
"npm:opencode-ai" = "latest"
"npm:@earendil-works/pi-coding-agent" = "latest"
"npm:aicommit2" = "latest"
"npm:skills" = "latest"
"npm:tokscale" = "latest"
"npm:mcporter" = "latest"
"npm:@loongphy/codex-auth" = "latest"
# "cargo:rikabot" = "latest"
# ollama = "latest"

# LSPs and formatters
"pipx:ty" = "latest"

# IaC Tools
terraform = "1.9.3"
terragrunt = "latest"
# pulumi = "latest"
# ansible = "latest"

# CLI
fnox = "latest"
git-cliff = "latest"
hugo = "v0.145.0"
lazydocker = "latest"
neovim = "0.12"
prek = "latest"
rclone = "latest"
restic = "latest"
television = "latest"
yq = "latest"

"cargo:worktrunk" = "latest"
"github:rtk-ai/rtk" = "latest"
"github:steipete/gogcli" = "latest"
"npm:@tobilu/qmd" = "latest"
"npm:agent-browser" = "latest"
"npm:kagi-cli" = "latest"
"npm:playwright" = "latest"

# Disabled Tools
# deno = "latest"
# java = "corretto-21.0.8"
# gradle = "8.5"

[settings]
experimental = true

[settings.npm]
bun = true
[settings.pipx]
uvx = true
