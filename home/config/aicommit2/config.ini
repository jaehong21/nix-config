# aicommit2 configuration
# Docs: https://github.com/tak-bro/aicommit2#configuration
# OpenRouter provider: https://github.com/tak-bro/aicommit2/blob/main/docs/providers/openrouter.md
#
# Resolved by aicommit2 in this order:
#   1. CLI flags
#   2. Environment variables
#   3. This config file
#   4. Built-in defaults

# ---- General settings --------------------------------------------------------
generate=3
type=conventional
temperature=0.2

# ---- Providers ---------------------------------------------------------------
# OPENROUTER is the only configured provider; OPENROUTER_API_KEY is exported
# from secrets.nix via sops-nix (see home/jaehong21/secrets.nix).
#
# Model: openai/gpt-oss-120b, routed through OpenRouter.
#
# `provider.order[]` lists inference providers in preference order. OpenRouter
# tries each in sequence; on failure it moves to the next when
# `provider.allow_fallbacks=true`. Catalog availability is published by
# OpenRouter — pick providers with status 0 to avoid degraded behavior.
#
# INI array syntax gotcha: aicommit2 reads `order[]=x` (key name ending in `[]`)
# as a real JSON array element. `order=["x"]` is parsed as a string and
# rejected by OpenRouter with HTTP 400.
[OPENROUTER]
envKey=OPENROUTER_API_KEY
model=openai/gpt-oss-120b
url=https://openrouter.ai
path=/api/v1/chat/completions

[OPENROUTER.responseFormat]
type=json_object

[OPENROUTER.provider]
order[]=groq
allow_fallbacks=true
require_parameters=false

# GROQ_API_KEY is also exported from secrets.nix, which makes aicommit2 auto-
# detect and try the GROQ provider directly with its default model. Disable it
# here so only the OpenRouter -> providers above are used.
[GROQ]
disabled=true
